name: Update lockup data


on:
  schedule:
    # 09:30 Asia/Seoul (= 00:30 UTC) — KRX가 공개한 전 거래일 종가·시가총액을
    # 장 시작 전에 다시 확인한다. 자정 배치는 최신 일별매매정보가 아직 없을 수 있다.
    - cron: "30 0 * * *"
    # 20:00 Asia/Seoul (= 11:00 UTC) — 장 마감(15:30) 후 확정되는 당일 상장·공시를
    # 당일 저녁에 반영한다. 당일 상장 종목이 다음날이 아니라 당일 저녁에 잡힌다.
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      reset_sheet:
        description: "Google Sheet의 기존 탭을 지우고 한글 헤더로 초기화"
        required: true
        default: false
        type: boolean
      reparse_existing:
        description: "기존 종목도 DART에서 다시 파싱"
        required: true
        default: false
        type: boolean
      reparse_incomplete:
        description: "종목관리·IPO기관·기존주주(락업) 빈값 종목만 DART 재파싱 (IPO일정 탭은 별도 백필)"
        required: true
        default: true
        type: boolean
      backfill_all:
        description: "IPO일정 미채움 종목(과거 신고서·실적보고서) 전량 백필 — 배치당 상한 해제"
        required: true
        default: false
        type: boolean


permissions:
  contents: write


concurrency:
  group: update-lockup-data
  cancel-in-progress: false


jobs:
  update:
    runs-on: ubuntu-latest
    # 최초 대량 편입은 DART PDF 100여 건을 순차 처리하므로 150분을 넘을 수 있다.
    # 이후 일일 배치는 기존 종목 재파싱을 생략해 훨씬 짧게 끝난다.
    timeout-minutes: 360
    env:
      KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v5


      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip


      - name: Install parser dependencies
        run: python -m pip install -r requirements.txt


      - name: Pull manual edits from Google Sheet
        if: ${{ github.event_name == 'schedule' || github.event.inputs.reset_sheet != 'true' }}
        run: python -m scripts.sheets_sync pull-admin


      - name: Build lockup data
        shell: bash
        run: |
          ARGS=()
          if [ "${{ github.event.inputs.reparse_existing }}" = "true" ]; then
            ARGS+=(--reparse-existing)
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.reparse_incomplete }}" = "true" ]; then
            ARGS+=(--reparse-incomplete)
          fi
          if [ "${{ github.event.inputs.backfill_all }}" = "true" ]; then
            ARGS+=(--backfill-all)
          fi
          python -m scripts.build "${ARGS[@]}"

      - name: Update Google Sheet
        shell: bash
        run: |
          if [ "${{ github.event.inputs.reset_sheet }}" = "true" ]; then
            python -m scripts.sheets_sync reset-all
          else
            python -m scripts.sheets_sync push-all
          fi

      - name: Commit generated data
        # 타임아웃·중단으로 앞 단계가 끊겨도 중간 저장된 데이터는 커밋해
        # 다음 실행이 이어서 진행되게 한다 (편입 완료 종목은 재파싱 안 함)
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: update lockup data"
          # 배치가 도는 동안 다른 커밋(수동 푸시·다른 배치)이 main에 먼저 올라가면
          # push가 non-fast-forward로 거부된다(run #51). rebase 후 재시도하되,
          # 충돌 시 방금 생성한 데이터(-X theirs: rebase에서는 우리 커밋 쪽)를 우선한다.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase -X theirs origin main
          done
          git push
